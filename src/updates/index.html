---
layout: about
title: Updates
path: updates
eleventyImport:
  collections: ["updates"]
---

<section class="not-prose max-w-3xl">
  <ol class="!pl-0 mt-8 divide-y divide-slate-200 dark:divide-slate-800 text-slate-500 dark:text-slate-400">
    {% for update in collections.updates | reverse %}
    <li class="py-4 sm:py-6 lg:py-8 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3">
      <a class="font-bold text-3xl sm:text-4xl hover:underline hover:text-brand-red" href="{{ update.data.page.url }}">{{ update.data.title }}</a>
      <time datetime="{{ update.data.date }}" class="dark:text-slate-500 tabular-nums flex-none">{{ update.date | readableDate }}</time>
    </li>
    {% endfor %}
  </ol>
</section>
