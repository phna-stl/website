items:
  - date: 2026-04-05
    title: PHNA April Happy Hour
    description: Our April happy hour will be at Salvage Yard Bar and Grill, at 5406
      Hampton Ave. We hope to see you there!
    author: Mark Richter
    category: Events
  - date: 2025-10-08
    description: >
      Support the Princeton Heights neighborhood by becoming a PHNA member!
      Memberships start at just $15; join or renew right here [on our
      website](https://phna-stl.square.site/).
    title: PHNA Memberships
    author: Mark Richter
    category: Announcement
  - date: 2026-01-17
    title: PHNA's 2026 Calendar
    description: Our 2026 calendar of events is now available! [Check it
      out](https://phna-stl.org/events/)! More dates to be announced later.
      We'll see you at our next general meeting, Thursday, April 2 at 7 PM at
      Bethel Church.
    author: Mark Richter
    category: Announcements
