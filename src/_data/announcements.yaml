items:
  - date: 2026-05-18
    title: June Meeting Moved to June 11
    description: Due to scheduling conflicts, we are moving our June meeting out by
      one week, to the second Thursday of the month - June 11. Same time (7 PM )
      and same place - Bethel Church, 5401 S. Kingshighway Blvd. Look for our
      signs the week of the meeting, and we hope to see you there!
    author: Mark Richter
    category: Events
  - date: 2026-05-06
    description: The PHNA Neighborhood Picnic is May 30 at 11 AM! We are once again
      hosting the picnic behind CoRadius Coworking (5850 Macklind Ave.), next to
      Zoomie's dog yard. We'll have hot dogs and brats from G&W Meats, yard
      games and live music from Signs of a Struggle and Monroe Yancie.
    author: Mark Richter
    category: Events
    title: Annual Neighborhood Picnic
  - date: 2026-05-06
    title: Century Home Plaques
    description: Century Home plaques are now on sale! Designed by PHNA and created
      by The Done Dept., each plaque is made from aluminum, 8"x8" in size and
      comes with pre-drilled holes for installation. Ordering is now available
      in the PHNA [website store](https://phna-stl.square.site/).
    author: Mark Richter
    category: Announcements
