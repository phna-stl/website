items:
  - date: 2026-04-25
    title: May Meeting
    description: Join us for our May general meeting, Thursday, May 7 at Bethel
      Church, 5401 S. Kingshighway Blvd. Our special guest speaker will be
      Gabrielle Hannah from the Alzheimer's Association - Greater Missouri
      Chapter, who will discuss supporting brain health in our community.
    author: Mark Richter
    category: Events
  - date: 2026-05-06
    title: PNHA Century Plaques
    description: Century Home plaques are now on sale! Designed by PHNA and created
      by The Done Dept., each plaque is made from aluminum, 8"x8" in size and
      comes with pre-drilled holes for installation. Ordering is now available
      in the PHNA [website store](https://phna-stl.square.site/).
    author: Mark Richter
    category: Announcements
  - date: 2026-05-06
    description: The PHNA Neighborhood Picnic is May 30 at 11 AM! We are once again
      hosting the picnic behind CoRadius Coworking (5850 Macklind Ave.), next to
      Zoomie's dog yard. We'll have food, yard games and live music. Stay tuned
      for more details!
    author: Mark Richter
    category: Events
    title: Annual Neighborhood Picnic
