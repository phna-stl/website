items:
  - date: 2026-05-06
    title: Century Home Plaques
    description: Century Home plaques are now on sale! Designed by PHNA and created
      by The Done Dept., each plaque is made from aluminum, 8"x8" in size and
      comes with pre-drilled holes for installation. Ordering is now available
      in the PHNA [website store](https://phna-stl.square.site/).
    author: Mark Richter
    category: Announcements
  - date: 2026-05-06
    description: The PHNA Neighborhood Picnic is May 30 at 11 AM! We are once again
      hosting the picnic behind CoRadius Coworking (5850 Macklind Ave.), next to
      Zoomie's dog yard. We'll have food, yard games and live music. Stay tuned
      for more details!
    author: Mark Richter
    category: Events
    title: Annual Neighborhood Picnic
  - date: 2026-05-07
    title: General Meeting Minutes
    description: "Can't make it to every PHNA general meeting? Stay informed by
      reviewing [our meeting
      minutes](https://drive.google.com/drive/folders/171bB96m4yfNwvzAYfuTdXRni\
      uC2XqXLN?usp=sharing). Save that link as a bookmark, or find the minutes
      linked from our website; from the main menu, click \"Who We Are\" and then
      \"Bylaws & Meeting Minutes.\" "
    author: Mark Richter
    category: Announcements
