items:
  - date: 2026-03-16
    title: March Happy Hour at Hatch'd
    description: "Join us this Thursday (March 19) for a special happy hour at
      Hatch'd STL! Hatch'd will open just for PHNA and your neighbors, from 5-7
      PM. Enjoy a cash bar, along with pizza from JJ Twigs, compliments of PHNA.
      "
    author: Mark Richter
    category: Events
  - date: 2025-10-08
    description: >
      Renew your PHNA membership by March 31 to avoid lapsing! If you're not
      already member, it's the perfect time to sign up! Memberships start at
      just $15; join or renew right here [on our
      website](https://phna-stl.square.site/).
    title: PHNA Memberships
    author: Mark Richter
    category: Announcement
  - date: 2026-01-17
    title: PHNA's 2026 Calendar
    description: Our 2026 calendar of events is now available! [Check it
      out](https://phna-stl.org/events/)! More dates to be announced later.
      We'll see you at our next general meeting, Thursday, April 2 at 7 PM at
      Bethel Church.
    author: Mark Richter
    category: Announcements
