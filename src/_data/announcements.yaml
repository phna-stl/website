items:
  - date: 2026-05-06
    title: Century Home Plaques
    description: Today is the last day to order your century home plaque! Order now
      from the PHNA [website store](https://phna-stl.square.site/). We
      anticipate plaques will be available for pick up at our September General
      Meeting. If you miss out this time, don’t worry; ordering will open again
      in November, with 1926 and pre-1910 years available!
    author: Mark Richter
    category: Announcements
  - date: 2026-06-29
    title: Princeton Heights Book
    description: Author and historian Jay Unnerstall is partnering with PHNA to
      produce a book chronicling the history of Princeton Heights! Call or text
      him at 314-476-8870, or email him at jayunnerstall@gmail.com, to share
      personal stories, historical photos, or other information about the
      neighborhood.
    author: Mark Richter
    category: Announcements
  - date: 2026-06-29
    description: We're taking our annual summertime break, and hope you have a great
      summer. The next PHNA event is our September general meeting, Thursday,
      September 3. We're still here, though, if you need us, [just reach
      out](mailto:info@phna-stl.org)!
    title: Enjoy Your Summer!
    author: Mark Richter
    category: Announcements
